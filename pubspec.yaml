name: loopedin_v2
description: "LoopedIn version 2.0"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  loading_animation_widget: ^1.3.0
  introduction_screen: ^3.1.17
  flutter_screenutil: ^5.8.4
  supabase_flutter: ^2.9.0
  shared_preferences: ^2.5.3
  app_links: ^3.4.1
  go_router: ^14.2.0
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  image_cropper_for_web: ^6.1.0
  cached_network_image: ^3.4.1
  animated_notch_bottom_bar: ^1.0.0
  carousel_slider: ^5.1.1
  syncfusion_flutter_charts: ^30.1.37
  flutter_supabase_chat_core: ^1.6.0
  provider: ^6.1.5
  chatview: ^2.5.0
  chatview_connect: ^0.0.1
  uuid: ^4.5.1
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_riverpod: ^2.6.1
  lottie: ^3.3.3

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
